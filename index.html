<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔍 탐정 추리단 — 대화 속 단서를 찾아라!</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --card2: #21262d;
  --text: #e6edf3;
  --muted: #8b949e;
  --radius: 14px;
  --green: #3fb950;
  --accent: #f78166;
  --gold: #e3b341;
  --blue: #58a6ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nanum Gothic', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(247,129,102,.06) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 70%, rgba(88,166,255,.05) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

/* ────────────────────────────────
   공통 버튼
──────────────────────────────── */
.btn {
  display: inline-block; border: none; cursor: pointer;
  font-family: 'Nanum Gothic', sans-serif; font-weight: 800;
  transition: all .2s; border-radius: var(--radius);
}
.btn:hover { transform: translateY(-2px); }

/* ════════════════════════════════
   SCREEN 0 : 메인 타이틀
════════════════════════════════ */
#screen-title {
  position: relative; z-index: 10;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px;
}
.title-badge {
  background: linear-gradient(135deg,var(--accent),var(--gold));
  color: #0d1117; font-size: 11px; font-weight: 800;
  letter-spacing: 2px; padding: 4px 16px; border-radius: 20px;
  text-transform: uppercase; margin-bottom: 18px;
}
.title-main {
  font-size: clamp(28px,7vw,52px); font-weight: 800; color: #fff;
  text-align: center; line-height: 1.2; margin-bottom: 10px;
}
.title-main em { color: var(--gold); font-style: normal; }
.title-sub {
  color: var(--muted); font-size: 14px; text-align: center;
  line-height: 1.7; max-width: 420px; margin-bottom: 48px;
}

/* 난이도 카드 그리드 */
.diff-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px; width: 100%; max-width: 600px; margin-bottom: 32px;
}
.diff-card {
  background: var(--card); border: 1.5px solid rgba(255,255,255,.07);
  border-radius: var(--radius); padding: 24px 20px;
  cursor: pointer; transition: all .22s; text-align: center;
  position: relative; overflow: hidden;
}
.diff-card::before {
  content: ''; position: absolute; inset: 0;
  opacity: 0; transition: opacity .22s;
}
.diff-card:hover { transform: translateY(-4px); }
.diff-card:hover::before { opacity: 1; }

/* 난이도별 색상 */
.diff-하  { --dc: #3fb950; }
.diff-중  { --dc: #58a6ff; }
.diff-상  { --dc: #e3b341; }
.diff-최상 { --dc: #f78166; }

.diff-하::before  { background: radial-gradient(ellipse at 50% 0%, rgba(63,185,80,.12), transparent 70%); }
.diff-중::before  { background: radial-gradient(ellipse at 50% 0%, rgba(88,166,255,.12), transparent 70%); }
.diff-상::before  { background: radial-gradient(ellipse at 50% 0%, rgba(227,179,65,.12), transparent 70%); }
.diff-최상::before{ background: radial-gradient(ellipse at 50% 0%, rgba(247,129,102,.12), transparent 70%); }

.diff-card:hover { border-color: var(--dc); box-shadow: 0 0 0 1px var(--dc); }

.diff-emoji { font-size: 32px; margin-bottom: 10px; display: block; }
.diff-label {
  font-size: 20px; font-weight: 800; color: var(--dc);
  margin-bottom: 6px;
}
.diff-title { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.diff-desc  { font-size: 12px; color: var(--text); line-height: 1.6; }
.diff-dots  { margin-top: 10px; display: flex; gap: 4px; justify-content: center; }
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,.15);
}
.dot.on { background: var(--dc); }

/* ── 잠금 상태 카드 ── */
.diff-card.locked {
  cursor: not-allowed;
  opacity: 0.45;
  filter: grayscale(0.6);
}
.diff-card.locked:hover {
  transform: none;
  border-color: rgba(255,255,255,.07) !important;
  box-shadow: none !important;
}
.lock-badge {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 10px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 20px; padding: 3px 10px;
  font-size: 11px; color: var(--muted); font-weight: 700;
}
.diff-card.cleared .lock-badge {
  background: rgba(63,185,80,.12);
  border-color: var(--green);
  color: var(--green);
}
.diff-card.cleared {
  border-color: rgba(63,185,80,.3) !important;
}

/* 클리어 배지 */
.clear-stamp {
  position: absolute; top: 10px; right: 10px;
  background: var(--green); color: #0d1117;
  font-size: 10px; font-weight: 800;
  padding: 2px 8px; border-radius: 20px;
  letter-spacing: 1px;
}

/* 잠금 해제 토스트 */
.unlock-toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #1a2a1a; border: 1px solid var(--green);
  color: var(--green); font-size: 13px; font-weight: 800;
  padding: 12px 24px; border-radius: 30px;
  z-index: 999; opacity: 0;
  transition: all .4s ease;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(63,185,80,.3);
}
.unlock-toast.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}

.tip-box {
  background: var(--card); border: 1px solid rgba(255,255,255,.06);
  border-radius: 10px; padding: 14px 20px; max-width: 600px; width: 100%;
}
.tip-box-title { font-size: 12px; color: var(--gold); font-weight: 800; margin-bottom: 10px; letter-spacing: 1px; }
.tip-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tip-chip {
  font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 700;
}
.tc-말    { background: rgba(88,166,255,.15); color: #58a6ff; border: 1px solid #58a6ff; }
.tc-행동  { background: rgba(247,129,102,.15); color: #f78166; border: 1px solid #f78166; }
.tc-경험  { background: rgba(63,185,80,.15);  color: #3fb950; border: 1px solid #3fb950; }
.tc-상황  { background: rgba(210,153,255,.15); color: #d2a8ff; border: 1px solid #d2a8ff; }

/* ════════════════════════════════
   SCREEN 1 : 게임
════════════════════════════════ */
#screen-game { display: none; position: relative; z-index: 10; }

/* 상단 바 */
.game-topbar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
  padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,.06);
  position: sticky; top: 0; background: var(--bg); z-index: 20;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.btn-back {
  background: var(--card2); border: 1px solid rgba(255,255,255,.1);
  color: var(--muted); font-size: 12px; padding: 5px 12px;
  border-radius: 8px; cursor: pointer; font-family: inherit;
  transition: all .2s;
}
.btn-back:hover { color: var(--text); border-color: rgba(255,255,255,.2); }
.diff-pill {
  font-size: 11px; font-weight: 800; padding: 3px 12px;
  border-radius: 20px;
}
.topbar-score { display: flex; gap: 12px; align-items: center; }
.tscore { font-size: 13px; }
.tscore span { font-weight: 800; font-size: 16px; }

/* 진행 바 */
.prog-wrap { padding: 10px 20px 0; }
.prog-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.prog-bar { height: 4px; background: rgba(255,255,255,.07); border-radius: 10px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 10px; transition: width .5s ease; }

/* 사건 카드 */
#caseArea { max-width: 760px; margin: 0 auto; padding: 16px 16px 0; }

.case-card {
  background: var(--card); border: 1px solid rgba(255,255,255,.07);
  border-radius: var(--radius); padding: 20px; margin-bottom: 12px;
  animation: fadeUp .35s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.case-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.case-num {
  color: #fff; font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 20px;
}
.case-title { font-size: 15px; font-weight: 700; color: var(--gold); flex: 1; }

.skill-tag { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
.skill-말    { background: rgba(88,166,255,.15);  color: #58a6ff; border:1px solid #58a6ff; }
.skill-행동  { background: rgba(247,129,102,.15); color: #f78166; border:1px solid #f78166; }
.skill-경험  { background: rgba(63,185,80,.15);   color: #3fb950; border:1px solid #3fb950; }
.skill-상황  { background: rgba(210,153,255,.15); color: #d2a8ff; border:1px solid #d2a8ff; }

.ctx-box {
  background: rgba(255,255,255,.03); border-left: 3px solid var(--blue);
  border-radius: 0 8px 8px 0; padding: 9px 13px; margin-bottom: 12px;
  font-size: 13px; color: var(--muted); line-height: 1.6;
}

/* 채팅 */
.chat-area { background: rgba(255,255,255,.02); border-radius: 10px; padding: 13px; margin-bottom: 12px; }
.chat-bubble { display: flex; gap: 8px; margin-bottom: 10px; }
.chat-bubble:last-child { margin-bottom: 0; }
.bubble-right { flex-direction: row-reverse; }
.av {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  background: var(--card2); border: 1.5px solid rgba(255,255,255,.08);
}
.bc { flex: 1; max-width: 82%; }
.bn { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 2px; }
.bubble-right .bn { text-align: right; }
.bt {
  background: var(--card2); padding: 8px 12px;
  border-radius: 0 10px 10px 10px;
  font-size: 13px; line-height: 1.6; color: var(--text);
  display: inline-block; max-width: 100%;
}
.bubble-right .bt { border-radius: 10px 0 10px 10px; background: #1c3a2a; }

/* 힌트 — 난이도별로 표시 여부 결정 */
.clue-strip {
  background: rgba(227,179,65,.05); border: 1px dashed rgba(227,179,65,.3);
  border-radius: 8px; padding: 10px 13px; margin-bottom: 12px;
}
.clue-lbl { font-size: 11px; color: var(--gold); font-weight: 800; letter-spacing: 1px; margin-bottom: 7px; }
.clue-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.ctag {
  background: rgba(227,179,65,.08); border: 1px solid rgba(227,179,65,.3);
  color: #e3c57a; font-size: 12px; padding: 3px 11px;
  border-radius: 20px; cursor: pointer; transition: all .18s; user-select: none;
}
.ctag:hover,.ctag.on { background: var(--gold); color: #0d1117; font-weight: 700; }

/* 선택지 */
.question-box {
  background: rgba(247,129,102,.07); border: 1px solid rgba(247,129,102,.22);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 11px;
}
.qlbl { font-size: 11px; color: var(--accent); font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
.question-box p { font-size: 14px; font-weight: 700; line-height: 1.55; }

.choices { display: flex; flex-direction: column; gap: 7px; margin-bottom: 11px; }
.choice-btn {
  background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.09);
  border-radius: 10px; padding: 10px 13px;
  text-align: left; color: var(--text);
  font-family: 'Nanum Gothic', sans-serif; font-size: 13px;
  cursor: pointer; transition: all .18s;
  display: flex; align-items: center; gap: 9px;
}
.cidx {
  width: 23px; height: 23px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; flex-shrink: 0; transition: all .18s;
}
.choice-btn:hover:not(:disabled) { background: rgba(63,185,80,.08); border-color: var(--green); }
.choice-btn:hover:not(:disabled) .cidx { background: var(--green); border-color: var(--green); color: #0d1117; }
.choice-btn.correct { background: rgba(63,185,80,.12); border-color: var(--green); }
.choice-btn.correct .cidx { background: var(--green); border-color: var(--green); color: #0d1117; }
.choice-btn.wrong { background: rgba(247,129,102,.08); border-color: var(--accent); opacity: .7; }
.choice-btn.wrong .cidx { background: var(--accent); border-color: var(--accent); color: #fff; }
.choice-btn:disabled { cursor: default; }

.feedback {
  padding: 12px 14px; border-radius: 10px; font-size: 13px;
  line-height: 1.65; margin-bottom: 11px; display: none;
}
.feedback.show { display: block; animation: fadeUp .3s ease; }
.feedback.correct { background: rgba(63,185,80,.1); border: 1px solid var(--green); color: #7ee787; }
.feedback.wrong   { background: rgba(247,129,102,.08); border: 1px solid var(--accent); color: #ffa198; }
.feedback strong  { font-size: 14px; display: block; margin-bottom: 4px; }

/* 다음 버튼 */
.btn-next {
  display: none; width: 100%; max-width: 760px; margin: 0 auto 24px;
  padding: 13px; background: linear-gradient(135deg,var(--accent),#d4513a);
  border: none; border-radius: var(--radius);
  color: #fff; font-family:'Nanum Gothic',sans-serif; font-size: 14px; font-weight: 800;
  cursor: pointer; transition: all .2s; letter-spacing: 1px; display: none;
}
.btn-next.show { display: block; }
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(247,129,102,.35); }
#btnNextWrap { padding: 0 16px; }

/* ════════════════════════════════
   SCREEN 2 : 결과
════════════════════════════════ */
#screen-result {
  display: none; position: relative; z-index: 10;
  text-align: center; padding: 48px 20px 60px;
}
#screen-result.show { display: block; animation: fadeUp .5s ease; }
.r-emoji { font-size: 64px; margin-bottom: 14px; }
.r-title { font-size: 26px; font-weight: 800; color: var(--gold); margin-bottom: 6px; }
.r-score { font-size: 48px; font-weight: 800; color: #fff; margin: 18px 0; }
.r-score span { color: var(--gold); font-size: 30px; }
.r-rank {
  background: var(--card); border-radius: var(--radius);
  padding: 20px; margin: 0 auto 20px; max-width: 520px;
  border: 1px solid rgba(255,255,255,.07);
}
.r-rank-badge { font-size: 17px; font-weight: 800; color: var(--green); margin-bottom: 5px; }
.r-rank-desc { font-size: 13px; color: var(--muted); line-height: 1.65; }

.r-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
.btn-retry {
  padding: 12px 28px;
  background: linear-gradient(135deg,var(--green),#2ea043);
  color: #0d1117; font-size: 14px;
}
.btn-retry:hover { box-shadow: 0 6px 20px rgba(63,185,80,.35); }
.btn-home {
  padding: 12px 28px;
  background: var(--card2); border: 1px solid rgba(255,255,255,.1);
  color: var(--text); font-size: 14px;
}
.btn-home:hover { border-color: rgba(255,255,255,.25); box-shadow: none; }

@media(max-width:500px){
  .diff-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .diff-card { padding: 18px 12px; }
  .diff-label { font-size: 17px; }
}
</style>
</head>
<body>

<!-- ══════════════ SCREEN 0 : 타이틀 ══════════════ -->
<div id="screen-title">
  <div class="title-badge">🔍 국어 5-1 · 1단원 · 심화 활동</div>
  <h1 class="title-main">탐정 <em>추리단</em> 🕵️</h1>
  <p class="title-sub">
    대화에서 생략된 내용을 짐작하는 탐정이 되어봐요!<br>
    난이도를 선택하고 사건을 해결하세요.
  </p>

  <div class="diff-grid" id="diffGrid">
    <!-- 카드는 JS로 렌더링 -->
  </div>

  <div class="tip-box">
    <div class="tip-box-title">🕵️ 짐작하는 4가지 방법</div>
    <div class="tip-row">
      <span class="tip-chip tc-말">💬 말에서 단서</span>
      <span class="tip-chip tc-행동">🤸 행동에서 단서</span>
      <span class="tip-chip tc-경험">💭 경험·배경지식</span>
      <span class="tip-chip tc-상황">🌍 상황 고려</span>
    </div>
  </div>
</div>

<!-- 잠금 해제 토스트 -->
<div class="unlock-toast" id="unlockToast"></div>

<!-- ══════════════ SCREEN 1 : 게임 ══════════════ -->
<div id="screen-game">
  <div class="game-topbar">
    <div class="topbar-left">
      <button class="btn-back" onclick="goHome()">← 난이도 선택</button>
      <span class="diff-pill" id="diffPill"></span>
    </div>
    <div class="topbar-score">
      <div class="tscore">점수 <span id="scoreVal">0</span></div>
      <div class="tscore" style="color:var(--green)">정답 <span id="correctVal">0</span></div>
      <div class="tscore" style="color:var(--muted)">사건 <span id="caseVal">1/7</span></div>
    </div>
  </div>
  <div class="prog-wrap">
    <div class="prog-meta"><span id="progLabel">진행 중...</span><span id="pctLabel">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div id="caseArea"></div>
  <div id="btnNextWrap">
    <button class="btn-next" id="btnNext" onclick="nextCase()">다음 사건으로 →</button>
  </div>
</div>

<!-- ══════════════ SCREEN 2 : 결과 ══════════════ -->
<div id="screen-result">
  <div class="r-emoji" id="rEmoji">🏆</div>
  <div class="r-title" id="rTitle">수사 완료!</div>
  <div class="r-score" id="rScore">0<span>점</span></div>
  <div class="r-rank" id="rRank"></div>
  <div class="r-btns">
    <button class="btn btn-retry" onclick="retryGame()">🔄 같은 난이도 다시</button>
    <button class="btn btn-home"  onclick="goHome()">🏠 난이도 선택으로</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   DATA  —  난이도별 7사건
   하: 단서 표시 O / 선택지 명확
   중: 단서 표시 O / 선택지 헷갈림
   상: 단서 표시 X / 깊은 생략
   최상: 단서 없음 / 선택지 매우 비슷
══════════════════════════════════════════════ */
const DATA = {

/* ─────────────── 하 ─────────────── */
하: [
  {
    title: '체육 시간 직전',
    ctx: '점심을 먹고 교실로 돌아오는 길, 5교시는 체육이에요.',
    chat: [
      {n:'준서', av:'🧒', r:false, t:'아, 배 터지게 먹었다. 너무 많이 먹은 것 같아.'},
      {n:'소율', av:'👧', r:true,  t:'오늘 5교시 뭐야?'},
      {n:'준서', av:'🧒', r:false, t:'체육…. (표정이 어두워지며 배를 쓸어내림)'},
      {n:'소율', av:'👧', r:true,  t:'오늘 좀 힘들겠다, 그치?'},
    ],
    clues:['배 터지게 먹었다','5교시 체육','표정이 어두워짐','배를 쓸어내림'],
    skill:'경험',
    q:'소율이가 "오늘 좀 힘들겠다"고 말한 이유로 가장 알맞은 것은?',
    cs:[
      '준서가 체육을 싫어한다고 말했기 때문이다.',
      '밥을 많이 먹은 뒤 격렬한 운동을 하면 힘들다는 것을 알기 때문이다.',
      '오늘 날씨가 너무 덥기 때문이다.',
      '체육 선생님이 힘든 수업을 한다고 했기 때문이다.',

const SKILL_CLS  = { 말:'skill-말', 행동:'skill-행동', 경험:'skill-경험', 상황:'skill-상황' };
const SHOW_CLUES = { 하:true, 중:true, 상:false, 최상:false };

/* ── 저장/로드 ── */
const SAVE_KEY = 'detective_cleared';
function getCleared() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '[]'); } catch(e) { return []; }
}
function setCleared(arr) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(arr)); } catch(e) {}
}
function isCleared(diff) { return getCleared().includes(diff); }
function markCleared(diff) {
  const arr = getCleared();
  if (!arr.includes(diff)) { arr.push(diff); setCleared(arr); }
}
function isUnlocked(diff) {
  const idx = DIFF_ORDER.indexOf(diff);
  if (idx === 0) return true; // '하'는 항상 열림
  return isCleared(DIFF_ORDER[idx - 1]); // 이전 단계 클리어 필요
}

/* ── 토스트 ── */
function showToast(msg) {
  const t = document.getElementById('unlockToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── 난이도 선택 화면 렌더 ── */
function renderDiffGrid() {
  const cleared = getCleared();
  const grid = document.getElementById('diffGrid');
  grid.innerHTML = DIFF_ORDER.map((diff, i) => {
    const unlocked = isUnlocked(diff);
    const cleared_this = isCleared(diff);
    const dots = Array(4).fill(0).map((_, di) =>
      `<div class="dot${di < DIFF_DOTS[diff] ? ' on' : ''}"></div>`).join('');
    const lockBadge = unlocked
      ? (cleared_this ? '<span class="lock-badge">✅ 클리어!</span>' : '')
      : `<span class="lock-badge">🔒 ${DIFF_ORDER[i-1]} 클리어 후 해금</span>`;
    const clearStamp = cleared_this ? '<span class="clear-stamp">CLEAR</span>' : '';
    const lockedClass = unlocked ? '' : ' locked';
    const clearedClass = cleared_this ? ' cleared' : '';
    const onclick = unlocked ? `onclick="startGame('${diff}')"` : `onclick="tryLocked('${diff}')"`;
    return `
      <div class="diff-card diff-${diff}${lockedClass}${clearedClass}" ${onclick}>
        ${clearStamp}
        <span class="diff-emoji">${unlocked ? DIFF_EMOJI[diff] : '🔒'}</span>
        <div class="diff-label">${diff}</div>
        <div class="diff-title">${DIFF_NAME[diff]}</div>
        <div class="diff-desc">${unlocked ? DIFF_DESC[diff] : '이전 단계를 먼저 클리어하세요.'}</div>
        <div class="diff-dots">${dots}</div>
        ${lockBadge}
      </div>`;
  }).join('');
}

/* ── 잠긴 카드 클릭 ── */
function tryLocked(diff) {
  const idx = DIFF_ORDER.indexOf(diff);
  const prev = DIFF_ORDER[idx - 1];
  showToast(`🔒 "${prev}" 난이도를 먼저 클리어하세요!`);
}

/* ── 화면 전환 ── */
function show(id) {
  ['screen-title','screen-game','screen-result'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = (s === id) ? 'block' : 'none';
  });
  if (id === 'screen-title') renderDiffGrid();
}

/* ── 게임 시작 ── */
function startGame(diff) {
  if (!isUnlocked(diff)) { tryLocked(diff); return; }
  curDiff = diff; curIdx = 0; score = 0; correct = 0; answered = false;
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('correctVal').textContent = 0;

  const pill = document.getElementById('diffPill');
  pill.textContent = diff + ' 난이도';
  pill.style.background = DIFF_COLOR[diff] + '22';
  pill.style.color = DIFF_COLOR[diff];
  pill.style.border = `1px solid ${DIFF_COLOR[diff]}`;

  const fill = document.getElementById('progFill');
  fill.style.background = `linear-gradient(90deg, ${DIFF_COLOR[diff]}, ${DIFF_COLOR[diff]}aa)`;

  show('screen-game');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── 렌더 ── */
function render() {
  const cases = DATA[curDiff];
  const c = cases[curIdx];
  answered = false;

  const pct = Math.round(curIdx / cases.length * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('pctLabel').textContent = pct + '%';
  document.getElementById('progLabel').textContent = `사건 ${curIdx + 1} / ${cases.length}`;
  document.getElementById('caseVal').textContent = `${curIdx + 1}/${cases.length}`;
  document.getElementById('btnNext').classList.remove('show');

  const chatHTML = c.chat.map(b => `
    <div class="chat-bubble${b.r?' bubble-right':''}">
      <div class="av">${b.av}</div>
      <div class="bc">
        <div class="bn">${b.n}</div>
        <div class="bt">${b.t}</div>
      </div>
    </div>`).join('');

  const clueHTML = (SHOW_CLUES[curDiff] && c.clues.length > 0) ? `
    <div class="clue-strip">
      <div class="clue-lbl">🔎 단서 키워드 — 눌러서 확인!</div>
      <div class="clue-tags">${c.clues.map(cl => `<span class="ctag" onclick="this.classList.toggle('on')">${cl}</span>`).join('')}</div>
    </div>` : '';

  const choicesHTML = c.cs.map((ch, i) => `
    <button class="choice-btn" onclick="pick(${i})" id="c${i}">
      <span class="cidx">${String.fromCharCode(65+i)}</span>
      <span>${ch}</span>
    </button>`).join('');

  document.getElementById('caseArea').innerHTML = `
    <div class="case-card">
      <div class="case-header">
        <span class="case-num" style="background:${DIFF_COLOR[curDiff]}">사건 ${curIdx + 1}</span>
        <span class="case-title">📋 ${c.title}</span>
        <span class="skill-tag ${SKILL_CLS[c.skill]}">${SKILL_MAP[c.skill]}</span>
      </div>
      <div class="ctx-box">📍 ${c.ctx}</div>
      <div class="chat-area">${chatHTML}</div>
      ${clueHTML}
      <div class="question-box">
        <div class="qlbl">🕵️ 추리 질문</div>
        <p>${c.q}</p>
      </div>
      <div class="choices">${choicesHTML}</div>
      <div class="feedback" id="fb"></div>
    </div>`;
}

/* ── 답 선택 ── */
function pick(i) {
  if (answered) return;
  answered = true;
  const c = DATA[curDiff][curIdx];
  const fb = document.getElementById('fb');
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  document.getElementById(`c${c.ans}`).classList.add('correct');

  if (i === c.ans) {
    document.getElementById(`c${i}`).classList.add('correct');
    fb.innerHTML = `<strong>🎉 정답!</strong>${c.ok}`;
    fb.className = 'feedback show correct';
    score += 100; correct++;
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('correctVal').textContent = correct;
  } else {
    document.getElementById(`c${i}`).classList.add('wrong');
    fb.innerHTML = `<strong>🤔 아쉬워요!</strong>${c.no}<br><br>정답은 <strong>${String.fromCharCode(65+c.ans)}번</strong>이에요.`;
    fb.className = 'feedback show wrong';
  }

  const btn = document.getElementById('btnNext');
  const total = DATA[curDiff].length;
  btn.textContent = curIdx === total - 1 ? '🏁 수사 결과 확인하기' : '다음 사건으로 →';
  btn.classList.add('show');
}

/* ── 다음 사건 ── */
function nextCase() {
  curIdx++;
  if (curIdx >= DATA[curDiff].length) showResult();
  else { render(); document.getElementById('screen-game').scrollIntoView({ behavior:'smooth', block:'start' }); window.scrollTo({top:0}); }
}

/* ── 결과 ── */
function showResult() {
  const total = DATA[curDiff].length;
  const pct = Math.round(correct / total * 100);

  // 클리어 조건: 57% 이상 (4개/7개 이상)
  const passed = pct >= 57;
  if (passed) markCleared(curDiff);

  let emoji, title, badge, desc;
  if (pct === 100)    { emoji='🏆'; title='완벽한 추리!';     badge='🥇 명탐정 수사관';  desc='모든 사건의 생략된 내용을 정확히 짐작했어요! 말, 행동, 경험, 상황 네 가지 탐정 스킬을 완벽하게 활용했어요.' }
  else if (pct >= 85) { emoji='🕵️'; title='훌륭한 수사!';    badge='🥈 베테랑 탐정';   desc='거의 모든 단서를 잡아냈네요! 놓친 부분만 더 연습하면 명탐정이에요.' }
  else if (pct >= 57) { emoji='🔍'; title='클리어!';          badge='🥉 견습 탐정';    desc='단서를 찾는 감각이 있어요. 다음 난이도가 해금됐어요!' }
  else                { emoji='📖'; title='다시 도전해봐요!'; badge='📌 수습 탐정';    desc='57% 이상 맞춰야 다음 난이도로 넘어갈 수 있어요. 한 번 더!' }

  // 다음 단계 해금 메시지
  const nextIdx = DIFF_ORDER.indexOf(curDiff) + 1;
  const nextUnlockMsg = (passed && nextIdx < DIFF_ORDER.length && !isCleared(DIFF_ORDER[nextIdx-1] === curDiff ? DIFF_ORDER[nextIdx] : ''))
    ? `<div style="margin-top:12px;padding:10px 14px;background:rgba(63,185,80,.1);border:1px solid var(--green);border-radius:10px;font-size:13px;color:var(--green);font-weight:800;">
        🔓 "${DIFF_ORDER[nextIdx]}" 난이도가 해금됐어요!
       </div>`
    : '';

  document.getElementById('rEmoji').textContent = emoji;
  document.getElementById('rTitle').textContent = title;
  document.getElementById('rScore').innerHTML   = `${score}<span>점</span>`;
  document.getElementById('rRank').innerHTML    = `
    <div class="r-rank-badge">${badge}</div>
    <div class="r-rank-desc">${desc}</div>
    <div style="margin-top:10px;font-size:12px;color:var(--muted)">정답 ${correct}개 / 전체 ${total}개 (${pct}%) · ${curDiff} 난이도</div>
    ${nextUnlockMsg}`;
  show('screen-result');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── 같은 난이도 다시 ── */
function retryGame() { startGame(curDiff); }

/* ── 홈으로 ── */
function goHome() { show('screen-title'); window.scrollTo({ top: 0, behavior: 'smooth' }); }

/* 초기화 */
show('screen-title');
</script>
</body>
</html>
